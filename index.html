<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ff6b35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🥕 Морковь Мессенджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Экран авторизации -->
        <div id="authScreen" class="screen">
            <div class="auth-container">
                <div class="logo">🥕 Морковь Messenger</div>
                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Вход</button>
                    <button class="tab-btn" data-tab="register">Регистрация</button>
                </div>
                
                <form id="loginForm" class="auth-form active">
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="loginName" placeholder="Имя пользователя" required autocomplete="off">
                    </div>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="loginPass" placeholder="Пароль" required>
                    </div>
                    <div class="error" id="loginError"></div>
                    <button type="submit" class="btn-primary">Войти</button>
                </form>
                
                <form id="registerForm" class="auth-form">
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="regName" placeholder="Имя пользователя" required autocomplete="off">
                    </div>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="regPass" placeholder="Пароль" required>
                    </div>
                    <div class="input-wrapper">
                        <span class="input-icon">✓</span>
                        <input type="password" id="regConfirmPass" placeholder="Повторите пароль" required>
                    </div>
                    <div class="error" id="regError"></div>
                    <button type="submit" class="btn-primary">Зарегистрироваться</button>
                </form>
            </div>
        </div>

        <!-- Главный экран мессенджера -->
        <div id="messengerScreen" class="screen" style="display: none;">
            <div class="messenger">
                <div id="chatsPanel" class="chats-panel active">
                    <div class="sidebar-header">
                        <div class="user-info">
                            <div class="avatar" id="userAvatar">🥜</div>
                            <div class="user-details">
                                <span class="user-name" id="currentUserName"></span>
                                <span class="user-status">онлайн</span>
                            </div>
                        </div>
                        <div style="display: flex; gap: 5px;">
                            <button class="icon-btn" id="adminPanelBtn" style="display: none;">👑</button>
                            <button class="icon-btn" id="shopBtn">🛒</button>
                            <button class="icon-btn" id="profileBtn">👤</button>
                        </div>
                    </div>
                    
                    <div class="chats-header">
                        <span>Чаты</span>
                        <div class="header-buttons">
                            <button class="icon-btn" id="createGroupBtn">👥</button>
                            <button class="icon-btn" id="addChatBtn">+</button>
                        </div>
                    </div>
                    
                    <div class="chats-search">
                        <input type="text" id="searchChats" placeholder="Поиск чатов..." class="search-input">
                    </div>
                    
                    <div class="chats-list" id="chatsList"></div>
                </div>
                
                <div id="chatPanel" class="chat-panel">
                    <div class="chat-header">
                        <button class="back-btn" id="backToChatsBtn">←</button>
                        <div class="chat-header-info">
                            <span id="currentChatName">Общий чат</span>
                            <span id="chatTypeIcon" class="chat-type-icon">🌍</span>
                        </div>
                        <button class="icon-btn" id="groupSettingsBtn" style="display: none;">⚙️</button>
                    </div>
                    
                    <div class="messages" id="messages"></div>
                    
                    <div class="message-input">
                        <input type="text" id="messageInput" placeholder="Введите сообщение..." class="input-field">
                        <button id="sendBtn" class="btn-primary send-btn">📤</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Модальные окна -->
        <div id="notificationModal" class="modal">
            <div class="modal-content small">
                <div class="modal-header">
                    <span class="modal-icon" id="notificationIcon">✅</span>
                    <h3 id="notificationTitle">Уведомление</h3>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <p id="notificationMessage"></p>
                </div>
                <div class="modal-footer">
                    <button class="btn-primary close-btn">Хорошо</button>
                </div>
            </div>
        </div>

        <div id="confirmModal" class="modal">
            <div class="modal-content small">
                <div class="modal-header">
                    <span class="modal-icon">⚠️</span>
                    <h3>Подтверждение</h3>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <p id="confirmMessage"></p>
                </div>
                <div class="modal-footer">
                    <button id="confirmOkBtn" class="btn-primary">Да</button>
                    <button id="confirmCancelBtn" class="btn-secondary">Отмена</button>
                </div>
            </div>
        </div>

        <div id="addChatModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>➕ Новый чат</h3>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <input type="text" id="chatUserName" placeholder="Имя пользователя" class="input-field" autocomplete="off">
                    <div class="error" id="addChatError"></div>
                </div>
                <div class="modal-footer">
                    <button id="confirmAddChat" class="btn-primary">Добавить</button>
                    <button class="btn-secondary close-btn">Отмена</button>
                </div>
            </div>
        </div>

        <div id="createGroupModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>👥 Создать группу</h3>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <input type="text" id="groupNameInput" placeholder="Название группы" class="input-field" autocomplete="off">
                    <div class="error" id="createGroupError"></div>
                </div>
                <div class="modal-footer">
                    <button id="confirmCreateGroup" class="btn-primary">Создать</button>
                    <button class="btn-secondary close-btn">Отмена</button>
                </div>
            </div>
        </div>

        <!-- Профиль с балансом -->
        <div id="profileModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>👤 Профиль</h3>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <div class="profile-avatar" id="profileAvatar">🥜</div>
                    <div class="profile-name" id="profileUsername"></div>
                    <div class="balance-section">
                        <span>🥕 Баланс:</span>
                        <span id="profileBalance" class="balance-amount">0</span>
                        <button id="sendCoinsBtn" class="btn-small">💸 Перевести</button>
                    </div>
                    
                    <div class="profile-section">
                        <h4>Сменить пароль</h4>
                        <input type="password" id="currentPassword" placeholder="Текущий пароль" class="input-field">
                        <input type="password" id="newPassword" placeholder="Новый пароль" class="input-field">
                        <input type="password" id="confirmPassword" placeholder="Подтвердите пароль" class="input-field">
                        <div class="error" id="profileError"></div>
                        <button id="changePasswordBtn" class="btn-primary">Сменить пароль</button>
                    </div>
                    
                    <div class="profile-section danger">
                        <h4>⚠️ Опасная зона</h4>
                        <button id="deleteAccountBtn" class="btn-danger">Удалить аккаунт</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Магазин аватарок -->
        <div id="shopModal" class="modal">
            <div class="modal-content" style="max-width: 500px;">
                <div class="modal-header">
                    <h3>🛒 Магазин аватарок</h3>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <div class="shop-balance">
                        🥕 Ваш баланс: <span id="shopBalance">0</span>
                    </div>
                    <div class="shop-items" id="shopItems"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary close-btn">Закрыть</button>
                </div>
            </div>
        </div>

        <!-- Перевод монет -->
        <div id="sendCoinsModal" class="modal">
            <div class="modal-content" style="max-width: 350px;">
                <div class="modal-header">
                    <h3>💸 Перевод 🥕</h3>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <input type="text" id="recipientName" placeholder="Кому отправить" class="input-field" autocomplete="off">
                    <input type="number" id="coinsAmount" placeholder="Сумма" class="input-field" min="1">
                    <div class="error" id="sendCoinsError"></div>
                </div>
                <div class="modal-footer">
                    <button id="confirmSendCoins" class="btn-primary">Отправить</button>
                    <button class="btn-secondary close-btn">Отмена</button>
                </div>
            </div>
        </div>

        <div id="groupModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="groupModalTitle">Участники группы</h3>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <div id="membersList" class="members-list"></div>
                    <button id="openAddMemberModal" class="btn-primary" style="width: 100%; margin-top: 10px;">➕ Добавить участника</button>
                </div>
            </div>
        </div>

        <div id="addMemberModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>➕ Добавить участника</h3>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <input type="text" id="memberName" placeholder="Имя пользователя" class="input-field" autocomplete="off">
                    <div class="error" id="addMemberError"></div>
                </div>
                <div class="modal-footer">
                    <button id="confirmAddMember" class="btn-primary">Добавить</button>
                    <button class="btn-secondary close-btn">Отмена</button>
                </div>
            </div>
        </div>
    </div>
<script type="module" src="app.js"></script>
<script src="admin.js"></script>
<script src="antihakers.js"></script>
</body>
</html>
